# ============================================================
# Notebook Validation — Ensure notebooks run top-to-bottom
# ============================================================
# Runs weekly and on PRs that modify notebooks.

name: Notebooks

on:
  pull_request:
    paths:
      - "notebooks/**"
      - "requirements.txt"
  schedule:
    # Run every Sunday at midnight UTC
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: 📓 Validate Notebooks
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-notebooks-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-notebooks-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nbval jupyter

      - name: Validate notebooks (CPU-only, Phases 1-3)
        run: |
          python scripts/validate_notebooks.py --cpu-only --phases 1,2,3 || true

      - name: Upload validation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: notebook-validation-results
          path: reports/notebook_validation.json
