name: Markdown Lint

on:
push:
branches:
- main

pull_request:
branches:
- main

jobs:
markdown-lint:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Lint Markdown Files
    uses: DavidAnson/markdownlint-cli2-action@v18
    with:
      globs: |
        **/*.md
```
