name: Link Checker

on:
push:
branches:
- main

pull_request:
branches:
- main

schedule:
# Runs every Sunday at 03:00 UTC
- cron: "0 3 * * 0"

jobs:
check-links:
runs-on: ubuntu-latest

```
permissions:
  contents: read

steps:
  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Check Links
    uses: lycheeverse/lychee-action@v2
    with:
      args: >
        --verbose
        --no-progress
        --accept 200,206,429
        "./**/*.md"
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  - name: Upload Link Report
    if: always()
    uses: actions/upload-artifact@v4
    with:
      name: link-report
      path: lychee/out.md
```
